<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ADHD study systems illustration">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ee"/>
      <stop offset="1" stop-color="#e7eee6"/>
    </linearGradient>
    <linearGradient id="teal2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f5d63"/>
      <stop offset="1" stop-color="#153f44"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <g opacity="0.10" stroke="#1f5d63" stroke-width="3" fill="none">
    <circle cx="120" cy="120" r="7" fill="#1f5d63"/><circle cx="200" cy="170" r="7" fill="#1f5d63"/>
    <circle cx="90" cy="210" r="7" fill="#1f5d63"/>
    <line x1="120" y1="120" x2="200" y2="170"/><line x1="120" y1="120" x2="90" y2="210"/>
  </g>
  <!-- three layered planner cards: long / short / daily -->
  <g transform="translate(300,140)">
    <rect x="40" y="0" width="360" height="220" rx="22" fill="#a7b8a5" opacity="0.55"/>
    <rect x="20" y="40" width="360" height="220" rx="22" fill="#dfe8dc"/>
    <rect x="0" y="84" width="360" height="240" rx="22" fill="#fffdf9" stroke="#1f5d63" stroke-opacity="0.18" stroke-width="2"/>
    <!-- daily card content: checklist of 3-5 -->
    <rect x="34" y="118" width="120" height="16" rx="8" fill="#1f5d63"/>
    <g>
      <rect x="34" y="158" width="22" height="22" rx="6" fill="none" stroke="#1f5d63" stroke-width="3"/>
      <path d="M 39 169 L 45 175 L 53 163" fill="none" stroke="#c8a96b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="70" y="161" width="230" height="14" rx="7" fill="#dfe8dc"/>
    </g>
    <g>
      <rect x="34" y="198" width="22" height="22" rx="6" fill="none" stroke="#1f5d63" stroke-width="3"/>
      <path d="M 39 209 L 45 215 L 53 203" fill="none" stroke="#c8a96b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="70" y="201" width="190" height="14" rx="7" fill="#dfe8dc"/>
    </g>
    <g>
      <rect x="34" y="238" width="22" height="22" rx="6" fill="none" stroke="#1f5d63" stroke-width="3"/>
      <rect x="70" y="241" width="210" height="14" rx="7" fill="#dfe8dc"/>
    </g>
  </g>
  <!-- pomodoro timer ring -->
  <g transform="translate(800,330)">
    <circle cx="0" cy="0" r="96" fill="#fffdf9" stroke="#1f5d63" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#e7e0d4" stroke-width="16"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#c8a96b" stroke-width="16" stroke-linecap="round" stroke-dasharray="180 603" transform="rotate(-90)"/>
    <circle cx="0" cy="-96" r="13" fill="#153f44"/>
    <text x="0" y="14" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="700" fill="#153f44">25</text>
  </g>
</svg>
